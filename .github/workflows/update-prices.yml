name: Update prices

on:
  schedule:
    # 15:30 UTC = 22:30 Bangkok for same-day local viewing.
    # 22:30 UTC ≈ after US market close for final US prices.
    - cron: "30 15,22 * * *"
  workflow_dispatch: {}   # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily price update ($(date -u +%Y-%m-%d))"
            git push
          fi
